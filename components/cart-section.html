<section class="cart-section py-5">
  <div class="container">
    <div class="text-center mb-5">
      <span class="text-uppercase fw-semibold text-primary">
        Shopping Cart
      </span>

      <h2 class="fw-bold mt-2">Your Cart</h2>

      <p class="text-muted">Review your selected items before checkout.</p>
    </div>

    <div class="row g-4">
      <!-- Cart Items -->
      <div class="col-lg-8">
        <div id="cartItems"></div>
      </div>

      <!-- Summary -->
      <div class="col-lg-4">
        <div id="cartSummary"></div>
      </div>
    </div>
  </div>
</section>

<!-- Checkout Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow-lg bg-white">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-dark fs-4" id="checkoutModalLabel">Delivery & Payment</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="checkoutForm">
        <div class="modal-body py-4">
          <div class="mb-3">
            <label for="checkoutAddress" class="form-label fw-semibold text-muted small">Delivery Address</label>
            <textarea class="form-control rounded-3 border-secondary-subtle" id="checkoutAddress" rows="3" placeholder="Enter your full street address..." required></textarea>
          </div>
          <div class="mb-3">
            <label for="checkoutPhone" class="form-label fw-semibold text-muted small">Phone Number</label>
            <input type="tel" class="form-control rounded-pill px-3 border-secondary-subtle" id="checkoutPhone" placeholder="E.g. +91 9876543210" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted small d-block">Payment Method</label>
            <div class="form-check form-check-inline mt-1">
              <input class="form-check-input text-primary shadow-none" type="radio" name="paymentMethod" id="cod" value="COD" checked>
              <label class="form-check-label text-dark" for="cod">Cash on Delivery (COD)</label>
            </div>
          </div>
          <div class="bg-light p-3 rounded-3 mt-4">
            <div class="d-flex justify-content-between align-items-center">
              <span class="text-muted small fw-semibold">Order Total:</span>
              <span class="fw-bold text-primary fs-5" id="checkout-modal-total">₹0</span>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">Place Order</button>
        </div>
      </form>
    </div>
  </div>
</div>
