<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Food E-Commerce</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card border-light shadow-sm p-4 rounded-4 bg-white">
              <h2 class="fw-bold text-center mb-4">Create Account</h2>

              <!-- Alert Placeholder -->
              <div id="alertPlaceholder" class="mb-3"></div>

              <form id="registerForm">
                <div class="mb-3">
                  <label
                    for="registerName"
                    class="form-label fw-semibold text-muted"
                    >Full Name</label
                  >
                  <input
                    type="text"
                    class="form-control rounded-pill px-3"
                    id="registerName"
                    placeholder="Your Name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label
                    for="registerEmail"
                    class="form-label fw-semibold text-muted"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    class="form-control rounded-pill px-3"
                    id="registerEmail"
                    placeholder="Your Email"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label
                    for="registerPassword"
                    class="form-label fw-semibold text-muted"
                    >Password</label
                  >
                  <input
                    type="password"
                    class="form-control rounded-pill px-3"
                    id="registerPassword"
                    placeholder="Minimum 6 characters"
                    minlength="6"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label
                    for="registerConfirmPassword"
                    class="form-label fw-semibold text-muted"
                    >Confirm Password</label
                  >
                  <input
                    type="password"
                    class="form-control rounded-pill px-3"
                    id="registerConfirmPassword"
                    placeholder="Confirm your password"
                    minlength="6"
                    required
                  />
                </div>

                <div class="d-grid mt-4">
                  <button
                    type="submit"
                    class="btn btn-primary rounded-pill py-2.5 fw-semibold shadow-sm"
                  >
                    Register
                  </button>
                </div>
              </form>

              <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                  Already have an account?
                  <a
                    href="login.html"
                    class="text-primary fw-semibold text-decoration-none"
                    >Login Here</a
                  >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
